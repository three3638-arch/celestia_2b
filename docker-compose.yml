services:
  db:
    image: postgres:16-alpine
    container_name: celestia-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: celestia
      POSTGRES_USER: celestia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-celestia_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celestia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
